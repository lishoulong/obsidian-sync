name: Cloudflare Worker CI

on:
  pull_request:
    paths:
      - "apps/worker/**"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - ".github/workflows/worker-ci.yml"
  push:
    branches: [main]
    paths:
      - "apps/worker/**"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - ".github/workflows/worker-ci.yml"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @vaultbridge/worker check
      - run: pnpm --filter @vaultbridge/worker test
      - run: pnpm --filter @vaultbridge/worker build
