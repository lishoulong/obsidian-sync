name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches manifest version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match manifest.json version $MANIFEST_VERSION" >&2
            exit 1
          fi

      - name: Create GitHub Release with BRAT assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="$GITHUB_REF_NAME"
            EXTRA_ARGS=(--verify-tag)
          else
            TAG="v$(node -p "require('./manifest.json').version")"
            EXTRA_ARGS=(--target "$GITHUB_SHA")
          fi
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping." >&2
            exit 0
          fi
          gh release create "$TAG" main.js manifest.json styles.css \
            --repo "$GITHUB_REPOSITORY" \
            --title "VaultBridge Sync ${TAG#v}" \
            "${EXTRA_ARGS[@]}" \
            --generate-notes
